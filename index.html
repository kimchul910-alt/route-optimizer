<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>창업보육전문매니저 문제은행</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
      color: #222;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .desc {
      color: #666;
      margin-bottom: 20px;
    }

    .box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      background: #fafafa;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 16px;
      align-items: center;
    }

    label {
      font-weight: bold;
      min-width: 90px;
    }

    select, input[type="number"] {
      padding: 8px 10px;
      font-size: 14px;
      min-width: 180px;
    }

    button {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #999;
      background: white;
      border-radius: 6px;
    }

    button:hover {
      background: #f2f2f2;
    }

    .question-card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 16px;
      background: white;
    }

    .meta {
      font-size: 13px;
      color: #777;
      margin-bottom: 8px;
    }

    .question-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .choice {
      margin: 8px 0;
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      background: #f7f7f7;
      border: 1px solid #ddd;
      font-weight: bold;
    }

    .correct {
      color: #0a7a0a;
      font-weight: bold;
    }

    .wrong {
      color: #c62828;
      font-weight: bold;
    }

    .explanation {
      margin-top: 10px;
      padding: 10px;
      background: #f9f9f9;
      border-left: 4px solid #999;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    .small {
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>창업보육전문매니저 문제은행</h1>
  <div class="desc">
    과목과 페이지 범위를 선택하면 해당 범위의 문제를 자동으로 불러옵니다.
  </div>

  <div class="box">
    <div class="row">
      <label for="subject">과목</label>
      <select id="subject">
        <option value="기술창업기초">기술창업기초</option>
        <option value="기술창업실무">기술창업실무</option>
        <option value="기술창업보육실무">기술창업보육실무</option>
        <option value="기술창업성장실무">기술창업성장실무</option>
        <option value="창업관련법규">창업관련법규</option>
      </select>
    </div>

    <div class="row">
      <label for="startPage">시작페이지</label>
      <input type="number" id="startPage" min="1" value="1" />
    </div>

    <div class="row">
      <label for="endPage">끝페이지</label>
      <input type="number" id="endPage" min="1" value="10" />
    </div>

    <div class="row">
      <label for="questionCount">문제 수</label>
      <input type="number" id="questionCount" min="1" max="50" value="5" />
    </div>

    <div class="row">
      <button onclick="generateQuiz()">문제 생성</button>
      <button onclick="checkAnswers()">정답 확인</button>
      <button onclick="resetQuiz()">초기화</button>
    </div>

    <div class="small">
      범위 내 문제가 부족하면 가능한 수만큼만 출력됩니다.
    </div>
  </div>

  <div id="summary" class="box hidden"></div>
  <div id="quizContainer"></div>
  <div id="scoreBox" class="result hidden"></div>

  <script>
    let currentQuestions = [];

    async function loadQuestions() {
      try {
        const response = await fetch("./questions.json");
        if (!response.ok) {
          throw new Error("questions.json 파일을 불러오지 못했습니다.");
        }
        return await response.json();
      } catch (error) {
        alert("문제 데이터를 불러오는 중 오류가 발생했습니다.\n" + error.message);
        return [];
      }
    }

    function shuffleArray(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    async function generateQuiz() {
      const subject = document.getElementById("subject").value;
      const startPage = Number(document.getElementById("startPage").value);
      const endPage = Number(document.getElementById("endPage").value);
      const questionCount = Number(document.getElementById("questionCount").value);

      if (!startPage || !endPage || startPage < 1 || endPage < 1) {
        alert("페이지를 올바르게 입력하세요.");
        return;
      }

      if (startPage > endPage) {
        alert("시작페이지는 끝페이지보다 클 수 없습니다.");
        return;
      }

      const allQuestions = await loadQuestions();

      const filtered = allQuestions.filter(q =>
        q.subject === subject &&
        q.page >= startPage &&
        q.page <= endPage
      );

      if (filtered.length === 0) {
        document.getElementById("quizContainer").innerHTML = "";
        document.getElementById("summary").classList.remove("hidden");
        document.getElementById("summary").innerHTML = `
          <strong>검색 결과</strong><br>
          선택한 범위에 해당하는 문제가 없습니다.<br>
          과목: ${subject}<br>
          페이지: ${startPage} ~ ${endPage}
        `;
        document.getElementById("scoreBox").classList.add("hidden");
        return;
      }

      currentQuestions = shuffleArray(filtered).slice(0, questionCount);

      document.getElementById("summary").classList.remove("hidden");
      document.getElementById("summary").innerHTML = `
        <strong>문제 생성 완료</strong><br>
        과목: ${subject}<br>
        페이지 범위: ${startPage} ~ ${endPage}<br>
        검색된 문제 수: ${filtered.length}개<br>
        실제 출제 문제 수: ${currentQuestions.length}개
      `;

      renderQuiz(currentQuestions);
      document.getElementById("scoreBox").classList.add("hidden");
    }

    function renderQuiz(questions) {
      const container = document.getElementById("quizContainer");
      container.innerHTML = "";

      questions.forEach((q, idx) => {
        const choicesHtml = q.choices.map((choice, choiceIdx) => {
          const value = choiceIdx + 1;
          return `
            <div class="choice">
              <label>
                <input type="radio" name="q${idx}" value="${value}">
                ${value}. ${choice}
              </label>
            </div>
          `;
        }).join("");

        const card = document.createElement("div");
        card.className = "question-card";
        card.innerHTML = `
          <div class="meta">과목: ${q.subject} | 페이지: ${q.page}</div>
          <div class="question-title">${idx + 1}. ${q.question}</div>
          <div>${choicesHtml}</div>
          <div id="feedback-${idx}" class="explanation hidden"></div>
        `;
        container.appendChild(card);
      });
    }

    function checkAnswers() {
      if (currentQuestions.length === 0) {
        alert("먼저 문제를 생성하세요.");
        return;
      }

      let correctCount = 0;

      currentQuestions.forEach((q, idx) => {
        const selected = document.querySelector(`input[name="q${idx}"]:checked`);
        const feedbackEl = document.getElementById(`feedback-${idx}`);

        if (!selected) {
          feedbackEl.classList.remove("hidden");
          feedbackEl.innerHTML = `
            <span class="wrong">미응답</span><br>
            정답: ${q.answer}번<br>
            해설: ${q.explanation}
          `;
          return;
        }

        const selectedValue = Number(selected.value);

        if (selectedValue === q.answer) {
          correctCount++;
          feedbackEl.classList.remove("hidden");
          feedbackEl.innerHTML = `
            <span class="correct">정답</span><br>
            정답: ${q.answer}번<br>
            해설: ${q.explanation}
          `;
        } else {
          feedbackEl.classList.remove("hidden");
          feedbackEl.innerHTML = `
            <span class="wrong">오답</span><br>
            선택: ${selectedValue}번<br>
            정답: ${q.answer}번<br>
            해설: ${q.explanation}
          `;
        }
      });

      const scoreBox = document.getElementById("scoreBox");
      scoreBox.classList.remove("hidden");
      scoreBox.innerHTML = `총점: ${correctCount} / ${currentQuestions.length}`;
    }

    function resetQuiz() {
      currentQuestions = [];
      document.getElementById("quizContainer").innerHTML = "";
      document.getElementById("summary").classList.add("hidden");
      document.getElementById("scoreBox").classList.add("hidden");
    }
  </script>
</body>
</html>
