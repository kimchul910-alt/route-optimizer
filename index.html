<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>배송 권역 고속 분석기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 980px;
      margin: 30px auto;
      padding: 0 16px;
      line-height: 1.5;
    }
    h2 {
      margin-bottom: 8px;
    }
    .box {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    label {
      display: inline-block;
      margin-right: 12px;
      margin-bottom: 8px;
    }
    select, button, input[type="file"] {
      padding: 6px;
    }
    #output {
      white-space: pre-wrap;
      background: #fcfcfc;
      border: 1px solid #ddd;
      padding: 16px;
      border-radius: 8px;
      min-height: 240px;
    }
    .small {
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <h2>배송 권역 고속 분석기</h2>
  <p class="small">
    CSV 형식: 주소,항목<br>
    예: 전북 전주시 완산구 효자동 123,냉장
  </p>

  <div class="box">
    <label>
      CSV 파일:
      <input type="file" id="fileInput" accept=".csv" />
    </label>

    <label>
      묶음 기준:
      <select id="groupLevel">
        <option value="3">시/군/구 기준</option>
        <option value="4" selected>동 기준</option>
        <option value="5">상세 5토큰 기준</option>
      </select>
    </label>

    <button onclick="processCSV()">분석하기</button>
  </div>

  <div class="box">
    <strong>분석 결과</strong>
    <div id="output"></div>
  </div>

  <script>
    function setOutput(msg) {
      document.getElementById("output").textContent = msg;
    }

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];

        if (char === '"') {
          if (inQuotes && line[i + 1] === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    function normalizeAddress(address) {
      return address
        .replace(/\s+/g, " ")
        .replace(/^\s+|\s+$/g, "");
    }

    function getRegionKey(address, level) {
      const normalized = normalizeAddress(address);
      const parts = normalized.split(" ").filter(Boolean);

      if (parts.length === 0) return "주소 없음";
      return parts.slice(0, Math.min(level, parts.length)).join(" ");
    }

    function processCSV() {
      const file = document.getElementById("fileInput").files[0];
      const groupLevel = parseInt(document.getElementById("groupLevel").value, 10);

      if (!file) {
        alert("CSV 파일을 선택하세요.");
        return;
      }

      const reader = new FileReader();

      reader.onload = function(e) {
        try {
          const text = e.target.result;
          const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");

          if (lines.length < 2) {
            setOutput("데이터가 없습니다.");
            return;
          }

          const header = parseCSVLine(lines[0]);
          const addressIndex = header.findIndex(h => h.trim() === "주소");
          const itemIndex = header.findIndex(h => h.trim() === "항목");

          if (addressIndex === -1) {
            setOutput("CSV 첫 줄에 '주소' 컬럼이 필요합니다.");
            return;
          }

          const regions = {};
          let totalCount = 0;

          for (let i = 1; i < lines.length; i++) {
            const cols = parseCSVLine(lines[i]);
            const address = normalizeAddress((cols[addressIndex] || "").trim());
            const item = (itemIndex >= 0 ? (cols[itemIndex] || "").trim() : "") || "일반";

            if (!address) continue;

            const region = getRegionKey(address, groupLevel);

            if (!regions[region]) {
              regions[region] = {
                count: 0,
                items: {},
                addresses: []
              };
            }

            regions[region].count++;
            regions[region].items[item] = (regions[region].items[item] || 0) + 1;
            regions[region].addresses.push(address);
            totalCount++;
          }

          const sorted = Object.entries(regions).sort((a, b) => b[1].count - a[1].count);

          let result = "";
          result += "=== 고속 권역 분석 결과 ===\n\n";
          result += `총 분석 건수: ${totalCount}건\n`;
          result += `자동 생성 권역 수: ${sorted.length}개\n`;
          result += `묶음 기준 토큰 수: ${groupLevel}\n\n`;

          result += "=== 추천 이동 순서 ===\n\n";

          sorted.forEach((entry, idx) => {
            const region = entry[0];
            const data = entry[1];

            result += `${idx + 1}. ${region} (${data.count}건)\n`;

            Object.entries(data.items).forEach(([item, count]) => {
              result += `   - ${item}: ${count}건\n`;
            });

            const preview = data.addresses.slice(0, 3);
            preview.forEach((addr, i) => {
              result += `   - 주소${i + 1}: ${addr}\n`;
            });

            if (data.addresses.length > 3) {
              result += `   - 외 ${data.addresses.length - 3}건\n`;
            }

            result += "\n";
          });

          result += "=== 운영 제안 ===\n\n";

          if (sorted.length > 0) {
            result += `- ${sorted[0][0]} 권역이 가장 물량이 많으므로 1차 처리 권장\n`;
          }

          if (sorted.length > 1) {
            result += `- ${sorted[1][0]} 권역은 후속 처리 또는 2차 회차 권장\n`;
          }

          if (sorted.length >= 3) {
            result += "- 권역이 3개 이상이면 오전/오후 또는 차량별 분리 운영 검토 권장\n";
          }

          if (groupLevel === 3) {
            result += "- 현재는 넓은 권역 기준이므로 세부 동선 확인이 필요할 수 있음\n";
          } else if (groupLevel === 4) {
            result += "- 동 기준 분석으로 실무용 1차 판단에 적합함\n";
          } else if (groupLevel >= 5) {
            result += "- 세부 기준으로 묶여 권역 수가 많아질 수 있으므로 과분할 여부 확인 필요\n";
          }

          setOutput(result);
        } catch (err) {
          setOutput("처리 중 오류가 발생했습니다.\n\n" + err.message);
        }
      };

      reader.readAsText(file);
    }
  </script>
</body>
</html>
