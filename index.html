<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>배송 경로 분석기</title>
</head>
<body>

<h2>배송 경로 권역 분석 (무료)</h2>

<p>CSV 형식: 주소,항목</p>

<input type="file" id="fileInput" accept=".csv">
<button onclick="processCSV()">분석하기</button>

<pre id="output"></pre>

<script>
function processCSV() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert("파일 선택하세요");

  const reader = new FileReader();

  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.split("\n");

    let regions = {};

    for (let i = 1; i < lines.length; i++) {
      let line = lines[i].trim();
      if (!line) continue;

      let cols = line.split(",");
      let address = cols[0];
      let item = cols[1] || "일반";

      let parts = address.split(" ");

      if (parts.length < 4) continue;

      let region = parts.slice(0, 4).join(" "); // 동까지

      if (!regions[region]) {
        regions[region] = { count: 0, items: {} };
      }

      regions[region].count++;

      if (!regions[region].items[item]) {
        regions[region].items[item] = 0;
      }

      regions[region].items[item]++;
    }

    let sorted = Object.entries(regions)
      .sort((a, b) => b[1].count - a[1].count);

    let result = "=== 추천 이동 순서 ===\n\n";

    sorted.forEach((r, i) => {
      let region = r[0];
      let data = r[1];

      result += `${i+1}. ${region} (${data.count}건)\n`;

      let items = Object.entries(data.items);
      items.forEach(it => {
        result += `   - ${it[0]}: ${it[1]}건\n`;
      });

      result += "\n";
    });

    result += "=== 운영 제안 ===\n\n";

    if (sorted.length > 0) {
      result += `- ${sorted[0][0]} 권역을 먼저 처리하는 것이 효율적입니다\n`;
    }

    if (sorted.length > 1) {
      result += `- ${sorted[1][0]} 권역은 다음 순서로 이동 권장\n`;
    }

    if (sorted.length > 2) {
      result += `- 권역 수가 많으므로 2~3개 단위로 나누어 운영 권장\n`;
    }

    document.getElementById("output").textContent = result;
  };

  reader.readAsText(file);
}
</script>

</body>
</html>
