<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>문제은행 시스템</title>
</head>
<body>

<h2>문제은행</h2>

<select id="subject">
  <option value="기술창업기초">기초</option>
  <option value="기술창업실무">실무</option>
</select>

<br><br>

시작 페이지: <input type="number" id="startPage" value="1">
끝 페이지: <input type="number" id="endPage" value="50">
문제 수: <input type="number" id="count" value="10">

<br><br>

<button onclick="generateQuiz()">문제 생성</button>
<button onclick="submitQuiz()">제출</button>

<hr>

<div id="quiz"></div>
<div id="result"></div>

<script>

let currentQuestions = []

function getFile(subject) {
  if(subject === "기술창업기초") return "questions-basic.json"
  if(subject === "기술창업실무") return "questions-practice.json"
}

async function generateQuiz() {

  const subject = document.getElementById("subject").value
  const start = Number(document.getElementById("startPage").value)
  const end = Number(document.getElementById("endPage").value)
  const count = Number(document.getElementById("count").value)

  const res = await fetch(getFile(subject))
  const data = await res.json()

  const filtered = data.filter(q =>
    q.page >= start && q.page <= end
  )

  currentQuestions = filtered.sort(() => 0.5 - Math.random()).slice(0, count)

  let html = ""

  currentQuestions.forEach((q, i) => {
    html += `<div>
      <p>${i+1}. ${q.question}</p>
      ${q.choices.map((c, idx) =>
        `<label><input type="radio" name="q${i}" value="${idx+1}"> ${c}</label><br>`
      ).join("")}
    </div><br>`
  })

  document.getElementById("quiz").innerHTML = html
  document.getElementById("result").innerHTML = ""
}

function submitQuiz() {

  let score = 0

  currentQuestions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`)
    if(selected && Number(selected.value) === q.answer){
      score++
    }
  })

  document.getElementById("result").innerHTML =
    `점수: ${score} / ${currentQuestions.length}`
}

</script>

</body>
</html>
