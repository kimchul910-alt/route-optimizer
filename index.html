<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문제은행 테스트</title>
</head>
<body>
  <h1>문제은행 테스트</h1>
  <button id="loadBtn">JSON 불러오기</button>
  <pre id="result"></pre>

  <script>
    const resultEl = document.getElementById("result");
    const loadBtn = document.getElementById("loadBtn");

    loadBtn.addEventListener("click", async () => {
      try {
        resultEl.textContent = "불러오는 중...";
        const response = await fetch("./questions-basic.json?ts=" + Date.now());

        if (!response.ok) {
          throw new Error("HTTP 오류: " + response.status);
        }

        const text = await response.text();
        const data = JSON.parse(text);

        resultEl.textContent =
          "성공\n\n" +
          "문제 수: " + data.length + "\n" +
          "첫 문제: " + JSON.stringify(data[0], null, 2);
      } catch (error) {
        resultEl.textContent = "오류 발생\n\n" + error.message;
        console.error(error);
      }
    });
  </script>
</body>
</html>
